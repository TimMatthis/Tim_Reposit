<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reposit No Bill - Unlocking True Value</title>

    <!-- Tailwind CSS (CDN for HubSpot) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        repositOrange: '#F68D26',
                        repositBlue: '#2A6B94',
                        forest: {
                            900: '#064E3B',
                            800: '#065F46',
                            700: '#047857',
                            200: '#A7F3D0',
                            100: '#D1FAE5'
                        },
                        techBlue: {
                            600: '#2563EB',
                            500: '#3B82F6',
                            400: '#60A5FA',
                            100: '#DBEAFE',
                            50: '#EFF6FF'
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <!-- Chart.js (CDN) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Babel standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: url(https://3445699.fs1.hubspotusercontent-na1.net/hubfs/3445699/noise.png), radial-gradient(circle at top left, rgba(246, 141, 38, 1) 5%, rgba(203, 128, 70, 1) 20%, rgba(42, 107, 148, 1) 60%, rgba(19, 26, 43, 1) 100%);
            background-blend-mode: multiply;
            min-height: 100vh;
            color: #333;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            backdrop-filter: blur(10px);
        }

        .dark-glass {
            background: rgba(19, 26, 43, 0.85);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .gradient-btn {
            background: linear-gradient(135deg, #F68D26 0%, #2A6B94 100%);
            color: white;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }

        .gradient-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(102, 126, 234, 0.4);
            filter: brightness(1.05);
        }

        .gradient-text {
            background: linear-gradient(135deg, #F68D26 0%, #2A6B94 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>

<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [currentBill, setCurrentBill] = useState(2500); // Annual bill
            const [energyInflation, setEnergyInflation] = useState(5); // % annual inflation
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            // Render Icons
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }); // Re-run on every render to catch new items

            // Graph 1: Asset vs Expense
            const generateRoiData = () => {
                let utilitySpendData = [];
                let assetValueData = [];
                let labels = [];
                let cumulativeUtility = 0;
                let repositFinanceAnnual = currentBill * 0.95; // Assuming Reposit financing saves ~5% from Day 1
                let cumulativeReposit = 0;
                let utilityRate = currentBill;

                for (let year = 1; year <= 7; year++) {
                    cumulativeUtility += utilityRate;
                    cumulativeReposit += repositFinanceAnnual;

                    labels.push(`Year ${year}`);
                    utilitySpendData.push(Math.round(cumulativeUtility));
                    // Hardware depreciates, but property value instantly boosts by $15k
                    assetValueData.push(Math.round((15000 * Math.pow(0.9, year - 1)) + 15000));

                    utilityRate *= (1 + (energyInflation / 100)); // Dynamic energy inflation
                }
                return { labels, utilitySpendData, assetValueData, repositFinanceAnnual };
            };

            const roiData = generateRoiData();

            // Financial Highlights calculations
            const weeklyBill = currentBill / 52;
            const weeklyFinance = roiData.repositFinanceAnnual / 52;
            const weeklyProfit = weeklyBill - weeklyFinance;
            const bankYield = ((currentBill / 15000) * 100).toFixed(1);

            // Update Chart when data changes
            useEffect(() => {
                if (chartInstance.current) {
                    chartInstance.current.destroy();
                }

                if (chartRef.current) {
                    const ctx = chartRef.current.getContext('2d');
                    chartInstance.current = new window.Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: roiData.labels,
                            datasets: [
                                {
                                    label: 'Cumulative Money Lost to Utility',
                                    data: roiData.utilitySpendData,
                                    borderColor: '#ef4444',
                                    backgroundColor: 'rgba(239, 68, 68, 0.2)',
                                    fill: true,
                                    tension: 0.4
                                },
                                {
                                    label: 'Value of Hardware Asset Owned',
                                    data: roiData.assetValueData,
                                    borderColor: '#10b981',
                                    backgroundColor: 'rgba(16, 185, 129, 0.2)',
                                    fill: true,
                                    tension: 0.4
                                }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    ticks: {
                                        callback: function (value) {
                                            return '$' + (value / 1000) + 'k';
                                        }
                                    }
                                }
                            },
                            plugins: {
                                tooltip: {
                                    callbacks: {
                                        label: function (context) {
                                            let label = context.dataset.label || '';
                                            if (label) {
                                                label += ': ';
                                            }
                                            if (context.parsed.y !== null) {
                                                label += '$' + context.parsed.y.toLocaleString();
                                            }
                                            return label;
                                        }
                                    }
                                }
                            }
                        }
                    });
                }
                return () => {
                    if (chartInstance.current) {
                        chartInstance.current.destroy();
                    }
                };
            }, [currentBill, energyInflation]);

            // Graph 2: The Fair Use Cap Buffer
            // We give 20% on top of their usage.
            const bufferValueAnnual = currentBill * 0.20;
            const bufferValue7Years = bufferValueAnnual * 7;

            // Relatable items for the buffer value
            const getRelatableItems = (value) => {
                return [
                    { name: 'Weekly Coffees for 7 Years', cost: 1500, icon: 'coffee' },
                    { name: 'A Family Beach Holiday', cost: 2500, icon: 'sun' },
                    { name: 'A Premium OLED TV', cost: 2000, icon: 'tv' },
                    { name: 'Years of Streaming Subs', cost: 1000, icon: 'play-square' },
                ].filter(item => item.cost <= value).slice(0, 3);
            };

            const relatableItems = getRelatableItems(bufferValue7Years);
            if (relatableItems.length < 3) {
                relatableItems.push({ name: 'Lots of Extra Spending Money', cost: bufferValue7Years, icon: 'wallet' });
            }

            return (
                <div className="min-h-screen text-slate-900 pb-20 font-['Inter']">

                    {/* Header */}
                    <div className="text-white py-16 px-6 text-center relative overflow-hidden">
                        <div className="relative z-10 max-w-4xl mx-auto">
                            <h1 className="text-4xl md:text-6xl font-extrabold mb-4 tracking-tight text-white drop-shadow-md">The True Value of No Bill</h1>
                            <p className="text-xl text-white/90 max-w-2xl mx-auto drop-shadow">
                                Stop burning money on energy bills. Start investing in a hardware asset that pays for itself.
                            </p>
                        </div>
                    </div>

                    <div className="max-w-5xl mx-auto px-6 mt-6 space-y-16">
                        {/* Interactive Input */}
                        <div className="glass-panel p-6 md:p-10 flex flex-col items-center shadow-lg border-t border-white/40">
                            <h2 className="text-3xl font-extrabold text-[#1f2937] mb-8 text-center drop-shadow-sm">Customize Your Scenario</h2>
                            <div className="grid md:grid-cols-2 gap-10 w-full max-w-4xl">
                                <div className="flex flex-col items-center text-center bg-[#f9fafb] p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <label className="text-xl font-bold text-[#1f2937] mb-2 flex items-center gap-2"><i data-lucide="zap" className="text-[#F68D26] w-5 h-5"></i> Current Annual Power Bill</label>
                                    <p className="text-[#4b5563] mb-6">What do you spend per year?</p>
                                    <input
                                        type="range"
                                        min="1000"
                                        max="6000"
                                        step="100"
                                        value={currentBill}
                                        onChange={(e) => setCurrentBill(Number(e.target.value))}
                                        className="w-full accent-[#F68D26] mb-6 h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer shadow-inner"
                                    />
                                    <div className="text-5xl font-extrabold gradient-text">${currentBill.toLocaleString()}<span className="text-2xl text-slate-500 font-bold mix-blend-normal">/yr</span></div>
                                </div>
                                <div className="flex flex-col items-center text-center bg-[#f9fafb] p-6 rounded-2xl shadow-sm border border-gray-100">
                                    <label className="text-xl font-bold text-[#1f2937] mb-2 flex items-center gap-2"><i data-lucide="trending-up" className="text-[#ef4444] w-5 h-5"></i> Expected Price Hike</label>
                                    <p className="text-[#4b5563] mb-6">How much will utility prices rise yearly?</p>
                                    <input
                                        type="range"
                                        min="0"
                                        max="20"
                                        step="1"
                                        value={energyInflation}
                                        onChange={(e) => setEnergyInflation(Number(e.target.value))}
                                        className="w-full accent-[#ef4444] mb-6 h-3 bg-gray-200 rounded-lg appearance-none cursor-pointer shadow-inner"
                                    />
                                    <div className="text-5xl font-extrabold text-[#ef4444]">{energyInflation}%<span className="text-2xl text-slate-500 font-bold mix-blend-normal">/yr</span></div>
                                </div>
                            </div>
                        </div>

                        {/* Section 1: ROI & Asset Ownership */}
                        <section>
                            <div className="text-center mb-8 bg-white/10 backdrop-blur-sm p-6 rounded-2xl border border-white/20">
                                <h2 className="text-3xl font-extrabold text-white mb-4 drop-shadow-sm">1. The Energy Sinkhole vs. Hardware Investment</h2>
                                <p className="text-lg text-white/90 max-w-3xl mx-auto drop-shadow-sm">
                                    When you pay the utility, your money is gone. Prices go up 5% every year, and after 7 years, you own <strong>nothing</strong>.
                                    With Reposit, you pay a fixed finance rate, never get an energy bill, and at the end of 7 years, you own a valuable solar and battery system.
                                </p>
                            </div>

                            <div className="glass-panel p-6 md:p-10">
                                <div className="h-[400px] w-full relative">
                                    <canvas ref={chartRef}></canvas>
                                </div>

                                <div className="grid md:grid-cols-2 gap-6 mt-8">
                                    <div className="bg-[#fef2f2] p-6 rounded-2xl border border-red-200 flex items-start gap-4 shadow-sm hover:shadow-md transition">
                                        <div className="p-3 bg-red-100 text-[#ef4444] rounded-xl"><i data-lucide="flame"></i></div>
                                        <div>
                                            <h4 className="font-bold text-[#7f1d1d] text-lg">The Energy Sinkhole</h4>
                                            <p className="text-red-900 mt-1 leading-relaxed">
                                                You will hand over roughly <strong className="text-[#ef4444]">${roiData.utilitySpendData[6].toLocaleString()}</strong> to your energy provider over 7 years. You will own absolutely $0 worth of assets.
                                            </p>
                                        </div>
                                    </div>
                                    <div className="bg-[#f0fdf4] p-6 rounded-2xl border border-emerald-200 flex items-start gap-4 shadow-sm hover:shadow-md transition bg-gradient-to-br from-[#f0fdf4] to-[#f8fafc]">
                                        <div className="p-3 bg-emerald-100 text-[#10b981] rounded-xl"><i data-lucide="wallet"></i></div>
                                        <div>
                                            <h4 className="font-bold text-[#064e3b] text-lg">Day 1 Cashflow Positive</h4>
                                            <p className="text-emerald-900 mt-1 leading-relaxed">
                                                Your current bill is ~${Math.round(weeklyBill)}/wk. Your guaranteed Reposit finance is ~${Math.round(weeklyFinance)}/wk.
                                                You make an instant <strong>profit of ~${Math.round(weeklyProfit)}/wk</strong> starting now.
                                            </p>
                                        </div>
                                    </div>
                                    <div className="bg-[#eef2ff] p-6 rounded-2xl border border-indigo-200 flex items-start gap-4 shadow-sm hover:shadow-md transition">
                                        <div className="p-3 bg-indigo-100 text-[#4f46e5] rounded-xl"><i data-lucide="home"></i></div>
                                        <div>
                                            <h4 className="font-bold text-[#312e81] text-lg">Property Value Boost</h4>
                                            <p className="text-indigo-900 mt-1 leading-relaxed">
                                                Having a guaranteed $0 Bill home <strong>adds an estimated +$15,000 equity</strong> to your property value for future buyers.
                                            </p>
                                        </div>
                                    </div>
                                    <div className="bg-[#fffbeb] p-6 rounded-2xl border border-amber-200 flex items-start gap-4 shadow-sm hover:shadow-md transition">
                                        <div className="p-3 bg-amber-100 text-[#d97706] rounded-xl"><i data-lucide="piggy-bank"></i></div>
                                        <div>
                                            <h4 className="font-bold text-[#78350f] text-lg">The Tax-Free ROI</h4>
                                            <p className="text-amber-900 mt-1 leading-relaxed">
                                                Eliminating a ${currentBill.toLocaleString()}/yr bill on a ~$15k system is equivalent to earning a massive <strong>{bankYield}% tax-free annual yield</strong> in the bank.
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Section 2: Fair Use Cap Buffer */}
                        <section>
                            <div className="text-center mb-8 bg-white/10 backdrop-blur-sm p-6 rounded-2xl border border-white/20">
                                <h2 className="text-3xl font-extrabold text-white mb-4 drop-shadow-sm">2. The Fair Use "Value Bonus"</h2>
                                <p className="text-lg text-white/90 max-w-3xl mx-auto drop-shadow-sm">
                                    Reposit guarantees your energy bill is $0. To be safe, we give you a Fair Use Cap that is <strong>20% larger</strong> than your current usage.
                                    If you were to buy that extra energy from the grid, it would cost a fortune. With us, it's free.
                                </p>
                            </div>

                            <div className="dark-glass p-8 md:p-12 text-white relative overflow-hidden flex flex-col md:flex-row items-center justify-between gap-12">
                                <div className="absolute -top-24 -right-24 w-64 h-64 bg-[#F68D26] rounded-full blur-[80px] opacity-20"></div>
                                <div className="absolute -bottom-24 -left-24 w-64 h-64 bg-[#2A6B94] rounded-full blur-[80px] opacity-20"></div>

                                <div className="z-10 relative md:w-1/2">
                                    <h3 className="text-2xl font-bold text-forest-200 mb-2">Free Energy Value over 7 Years</h3>
                                    <div className="text-6xl font-extrabold text-white mb-6">${Math.round(bufferValue7Years).toLocaleString()}</div>
                                    <p className="text-forest-100 text-lg leading-relaxed">
                                        That's standard 20% bonus capacity given to you. You can run the AC colder, take longer showers, and use the dryer without anxiety.
                                    </p>
                                </div>

                                <div className="z-10 relative md:w-1/2 w-full">
                                    <div className="glass-panel text-[#1f2937] p-6 border-0">
                                        <h4 className="text-lg font-bold mb-4">What ${Math.round(bufferValue7Years).toLocaleString()} buys you:</h4>
                                        <div className="space-y-4">
                                            {relatableItems.map((item, idx) => (
                                                <div key={idx} className="flex gap-4 items-center bg-[#f9fafb] border border-gray-100 p-4 rounded-xl shadow-sm">
                                                    <div className="text-[#F68D26]"><i data-lucide={item.icon}></i></div>
                                                    <div className="flex-grow font-semibold text-[#4b5563]">{item.name}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Final CTA Section */}
                        <section className="dark-glass p-10 md:p-16 text-center text-white relative overflow-hidden mt-16 shadow-2xl">
                            <div className="absolute top-0 right-0 w-64 h-64 bg-white/10 rounded-full blur-[80px] transform translate-x-1/2 -translate-y-1/2"></div>
                            <div className="absolute bottom-0 left-0 w-64 h-64 bg-[#F68D26]/30 rounded-full blur-[80px] transform -translate-x-1/2 translate-y-1/2"></div>

                            <div className="relative z-10 max-w-2xl mx-auto flex flex-col items-center">
                                <div className="p-4 bg-white/10 rounded-full mb-6 border border-white/20">
                                    <i data-lucide="camera" className="w-8 h-8 text-[#F68D26]"></i>
                                </div>
                                <h2 className="text-3xl md:text-5xl font-extrabold mb-6 tracking-tight">Ready to lock this in?</h2>
                                <p className="text-xl text-white/80 mb-10 leading-relaxed">
                                    If this math makes sense to you, the next step is simple. Upload your recent energy bills and a few photos of your switchboard.
                                    Our engineers will review them and send you a <strong>binding, $0 Bill Guaranteed quote</strong> within 24 hours.
                                </p>
                                <button className="gradient-btn font-bold text-xl px-10 py-5 rounded-[12px] w-full sm:w-auto flex justify-center items-center gap-3 uppercase tracking-wider">
                                    Get My Binding Quote
                                    <i data-lucide="arrow-right" className="transition-transform group-hover:translate-x-1"></i>
                                </button>
                                <p className="mt-6 text-white/60 text-sm flex items-center gap-2 justify-center">
                                    <i data-lucide="shield-check" className="w-4 h-4"></i> No commitment required to get a quote.
                                </p>
                            </div>
                        </section>

                    </div>

                    {/* Footer */}
                    <footer className="mt-24 text-white/50 py-12 text-center px-6">
                        <div className="flex justify-center mb-6 text-white/80 font-bold text-2xl tracking-tighter">
                            REPOSIT<span className="text-[#F68D26]">.</span>
                        </div>
                        <p>© 2026 Reposit Power. Empowering energy independence.</p>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
