<!--
  templateType: "page"
  label: "Reposit - Quote Offer"
  isAvailableForNewContent: true
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Offer | Reposit Power</title>
  <link rel="stylesheet" href="/css/style.css">
  {{ standard_header_includes }}
</head>
<body>
  <main class="hsq-page-wrap">
    <section class="hsq-card">
      <h1 class="hsq-title">Your Optimisation Offer</h1>
      <p class="hsq-body">
        We are retrieving your estimate now. This page uses your authenticated session cookie from the quote flow.
      </p>

      <div class="hsq-state" id="offerState" aria-live="polite">Loading your estimate...</div>
      <ul class="hsq-kv-list" id="offerList"></ul>

      <div class="hsq-actions">
        <button class="btn btn-primary" id="retryOfferBtn" type="button">Retry</button>
        <a class="btn btn-ghost" href="/get-quote">Start again</a>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var stateEl = document.getElementById('offerState');
      var listEl = document.getElementById('offerList');
      var retryBtn = document.getElementById('retryOfferBtn');
      var ESTIMATE_URL = 'https://api.repositpower.com/estimate';

      function setState(message, variant) {
        if (!stateEl) return;
        stateEl.className = 'hsq-state' + (variant ? ' ' + variant : '');
        stateEl.textContent = message;
      }

      function normalizeRows(payload) {
        if (!payload || typeof payload !== 'object') return [];
        var keys = Object.keys(payload);
        return keys.slice(0, 12).map(function (key) {
          var value = payload[key];
          if (value == null) value = '—';
          if (typeof value === 'object') value = JSON.stringify(value);
          return {
            label: key.replace(/_/g, ' '),
            value: String(value)
          };
        });
      }

      function renderRows(rows) {
        if (!listEl) return;
        listEl.innerHTML = '';
        rows.forEach(function (row) {
          var item = document.createElement('li');
          item.className = 'hsq-kv-item';
          item.innerHTML =
            '<span class="hsq-kv-key">' + row.label + '</span>' +
            '<span class="hsq-kv-value">' + row.value + '</span>';
          listEl.appendChild(item);
        });
      }

      function fetchEstimate() {
        setState('Loading your estimate...', '');
        if (listEl) listEl.innerHTML = '';

        fetch(ESTIMATE_URL, {
          method: 'GET',
          credentials: 'include'
        })
          .then(function (response) {
            return response
              .json()
              .catch(function () { return null; })
              .then(function (json) {
                if (!response.ok) {
                  var err = new Error('Estimate request failed.');
                  err.status = response.status;
                  err.payload = json;
                  throw err;
                }
                return json;
              });
          })
          .then(function (payload) {
            var rows = normalizeRows(payload);
            if (!rows.length) {
              setState('Estimate loaded but response was empty.', 'is-error');
              return;
            }
            renderRows(rows);
            setState('Estimate loaded successfully.', 'is-success');
          })
          .catch(function (error) {
            var status = error && error.status;
            if (status === 401 || status === 403) {
              setState('Your session has expired. Please restart from Get Quote.', 'is-error');
              return;
            }
            setState('Unable to load estimate right now. Please retry or start again.', 'is-error');
          });
      }

      if (retryBtn) {
        retryBtn.addEventListener('click', fetchEstimate);
      }

      fetchEstimate();
    }());
  </script>
  {{ standard_footer_includes }}
</body>
</html>
