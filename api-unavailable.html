<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reposit | Something went wrong</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header class="header">
    <p class="header-eyebrow">Reposit</p>
    <h1>Something went wrong</h1>
    <p class="header-sub">Please try again later.</p>
  </header>

  <main>
    <section class="card">
      <p class="card-desc">
        Our service is temporarily unavailable right now. Please come back in a few minutes.
      </p>
      <div class="card-links">
        <a class="link-item" href="/">
          <span class="link-item-label">Return to homepage</span>
          <span class="link-item-arrow">→</span>
        </a>
      </div>
    </section>
  </main>
</body>
</html>
